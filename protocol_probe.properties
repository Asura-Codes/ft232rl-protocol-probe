# =============================================================================
# ProtocolProbe Configuration
# =============================================================================
# Pin names use FT232RL physical signal labels.  These map to the bit indices
# that the libftdi bit-bang interface uses (D0..D7 on the HW-417 breakout):
#
#   TXD = D0    RXD = D1    RTS = D2    CTS = D3
#   DTR = D4    DSR = D5    DCD = D6    RI  = D7
#
# Accepted formats for pin values: signal name (TXD, RTS …) or bare integer.
# =============================================================================

# ---- FT232RL USB Device -----------------------------------------------
device.vendor_id  = 0x0403
device.product_id = 0x6001

# ---- REST Server ------------------------------------------------------
server.port = 8080

# ---- Pin Assignments --------------------------------------------------
# UART
pins.uart.tx   = TXD
pins.uart.rx   = RXD

# SPI  (RTS = MOSI, CTS = MISO, DTR = SCK, RI = CS/NSS)
pins.spi.mosi  = RTS
pins.spi.miso  = CTS
pins.spi.sck   = DTR
pins.spi.cs    = RI

# I2C  (DSR = SCL, DCD = SDA)
pins.i2c.scl   = DSR
pins.i2c.sda   = DCD

# ---- UART Defaults ----------------------------------------------------
uart.default_baud = 115200

# ---- SPI Defaults -----------------------------------------------------
spi.default_frequency_hz = 100000

# ---- I2C Defaults -----------------------------------------------------
i2c.default_frequency_hz = 100000

# ---- MAVLink ----------------------------------------------------------
mavlink.baud   = 115200
mavlink.sysid  = 1
mavlink.compid = 1

# ---- PMBus Register Addresses (standard PMBus command codes) ----------
pmbus.register.vout_mode  = 0x20
pmbus.register.read_vout  = 0x8B
pmbus.register.read_iout  = 0x8C
pmbus.register.read_pout  = 0x96
pmbus.register.read_temp1 = 0x8D

# ---- SD Card ----------------------------------------------------------
sdcard.init_retries  = 100
sdcard.read_retries  = 1000
sdcard.write_retries = 10000

# ---- Protocol Discovery -----------------------------------------------
discovery.sample_rate_hz      = 500000
discovery.default_duration_ms = 2000
discovery.uart_sniff_ms       = 2000
discovery.uart_probe_ms       = 2000

# ---- CLI Defaults -----------------------------------------------------
cli.default_baud        = 9600
cli.default_duration_ms = 500
cli.default_length      = 256
cli.default_slave_id    = 1

# ---- API Handler Defaults ---------------------------------------------
modbus.default_register_count   = 10
modbus.default_start            = 0
i2c.register_scan.default_end   = 255
i2c.register_scan.default_start = 0
eeprom.i2c.default_addr_size    = 1
gpio.capture.default_frequency_hz = 100000
gpio.capture.default_sample_count = 1024
uart.terminal.default_expect      = 64
uart.terminal.default_timeout_ms  = 500
mavlink.default_timeout_ms        = 2000
nmea.default_timeout_ms           = 2000
pmbus.default_device_address      = 0x10
pmbus.default_type                = voltage
fuzz.default_mode                 = scan
smbus.default_command             = 0
smbus.default_type                = byte
smbus.default_value               = 0
sdcard.default_block              = 0
sensor.default_channel            = -1

# ---- I2C EEPROM (24C Series) ------------------------------------------
eeprom.i2c.default_address = 0x50
eeprom.i2c.page_size_small = 8
eeprom.i2c.page_size_large = 32
eeprom.i2c.write_delay_ms  = 10

# ---- Generic I2C Sensor (ADS1x15-compatible) --------------------------
sensor.i2c.default_address  = 0x48
sensor.ads1x15.channel_count = 4

# ---- NMEA -------------------------------------------------------------
nmea.prefix              = $GP
nmea.sentence_max_length = 256

# ---- SPI Sensor -------------------------------------------------------
# Bit mask ORed onto register address to signal a read operation (0x80 for most sensors)
sensor.spi.read_mask = 0x80
