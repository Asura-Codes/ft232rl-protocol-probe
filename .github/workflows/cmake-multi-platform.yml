name: CMake multi-platform build + vcpkg + CPack

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, cl]

        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl

          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++

        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - name: Checkout
      uses: actions/checkout@v4
          
    # =========================
    # MSVC ENV (CRITICAL FIX)
    # =========================
    - name: Setup MSVC (Windows only)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # =========================
    # Linux deps
    # =========================
    - name: Install Linux deps
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y ninja-build autoconf automake libtool pkg-config libudev-dev

    # =========================
    # Ninja (Windows)
    # =========================
    - name: Install Ninja (Windows)
      if: runner.os == 'Windows'
      run: choco install ninja -y

    # =========================
    # vcpkg
    # =========================
    - name: Clone vcpkg
      run: git clone https://github.com/microsoft/vcpkg.git

    - name: Checkout vcpkg version
      working-directory: vcpkg
      run: git checkout 2025.04.09

    - name: Bootstrap vcpkg (Linux)
      if: runner.os != 'Windows'
      run: ./vcpkg/bootstrap-vcpkg.sh

    - name: Bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      run: .\vcpkg\bootstrap-vcpkg.bat

    - name: Set VCPKG_ROOT
      shell: bash
      run: echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

    # =========================
    # Cache vcpkg
    # =========================
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_ROOT }}/installed
          ${{ env.VCPKG_ROOT }}/packages
          ~/.cache/vcpkg
        key: ${{ runner.os }}-vcpkg-2025.04.09-${{ hashFiles('vcpkg.json') }}

    # =========================
    # Build directory
    # =========================
    - name: Set build dir
      id: strings
      shell: bash
      run: echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # =========================
    # CONFIGURE (NINJA FIXED)
    # =========================
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -G Ninja
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/vcpkg_installed
        -S ${{ github.workspace }}

    # =========================
    # BUILD
    # =========================
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }}

    # =========================
    # TEST
    # =========================
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}

    # =========================
    # PACKAGE (CPACK)
    # =========================
    - name: Package
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: cpack -C ${{ matrix.build_type }}

    # =========================
    # EXTRACT VERSION
    # =========================
    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=$(awk -F'"' '/^[[:space:]]*set\(CPACK_PACKAGE_VERSION[[:space:]]*"/ {print $2; exit}' CMakeLists.txt)
        echo "number=$VERSION" >> $GITHUB_OUTPUT

    # =========================
    # UPLOAD ARTIFACTS
    # =========================
    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: ft232rl-protocol-probe-${{ steps.version.outputs.number }}-${{ runner.os }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/bin
        if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: ft232rl-protocol-probe-*
        path: release-artifacts

    - name: List downloaded artifacts
      run: find release-artifacts -type f | sort

    - name: Bundle release assets
      working-directory: release-artifacts
      shell: bash
      run: |
        zip -r ft232rl-protocol-probe-${{ github.ref_name }}-Windows.zip ft232rl-protocol-probe-*-Windows
        tar -czf ft232rl-protocol-probe-${{ github.ref_name }}-Linux.tar.gz ft232rl-protocol-probe-*-Linux

    - name: List packaged release assets
      run: find release-artifacts -maxdepth 1 -type f | sort

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-artifacts/*.zip
          release-artifacts/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
